<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ff-funnel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5c9ff"/>
      <stop offset="0.45" stop-color="#c8b2ff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ff-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e3a"/>
      <stop offset="1" stop-color="#14142b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#ff-bg)"/>

  <!-- Funnel: wide trapezoid on top narrowing into a rounded rectangular stem -->
  <path
    d="M 9 14 L 55 14 L 40 33 L 40 51 Q 40 53.5 37.5 53.5 L 26.5 53.5 Q 24 53.5 24 51 L 24 33 Z"
    fill="url(#ff-funnel)"/>

  <!-- Form-field hint lines inside the upper funnel (subtle, for larger sizes) -->
  <rect x="19" y="19" width="19" height="1.8" rx="0.9" fill="#ffffff" opacity="0.45"/>
  <rect x="19" y="22.6" width="13" height="1.8" rx="0.9" fill="#ffffff" opacity="0.45"/>

  <!-- Checkmark overlaid on the funnel junction -->
  <path
    d="M 20 35 L 28.5 43.5 L 46 25"
    stroke="#ffffff"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
</svg>
